<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collabro Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a; --surface: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.1);
      --text: #f8fafc; --text2: #94a3b8; --purple: #3b82f6; --pink: #2563eb;
      --grad: linear-gradient(135deg,#3b82f6,#2563eb);
      --grad2: linear-gradient(135deg,#3b82f6,#2563eb);
      --radius: 16px;
    }
    body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: var(--radius); padding: 36px; max-width: 420px; width: 100%; text-align: center; }
    .avatar { width: 88px; height: 88px; border-radius: 50%; background: var(--grad2); display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 700; color: white; margin: 0 auto 16px; overflow: hidden; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .name { font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; }
    .location { font-size: 0.9rem; color: var(--text2); margin-bottom: 8px; }
    .bio { font-size: 0.9rem; color: var(--text2); line-height: 1.5; margin-bottom: 20px; }
    .skill-pill { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 999px; background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.3); font-size: 0.8rem; font-weight: 500; color: var(--purple); margin: 4px; }
    .stats { display: flex; gap: 24px; justify-content: center; margin: 20px 0; }
    .stat { text-align: center; }
    .stat-val { font-size: 1.4rem; font-weight: 700; }
    .stat-label { font-size: 0.75rem; color: var(--text2); }
    .id-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 6px 16px; font-size: 0.85rem; color: var(--text2); margin-bottom: 20px; }
    .id-badge span { font-weight: 700; color: var(--purple); letter-spacing: 0.1em; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 12px 28px; border-radius: 10px; font-family: inherit; font-size: 0.95rem; font-weight: 600; cursor: pointer; border: none; background: var(--grad2); color: white; text-decoration: none; margin-top: 16px; }
    .logo { font-size: 1rem; font-weight: 700; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 24px; }
    .error { color: #f87171; font-size: 0.9rem; }
  </style>
</head>
<body>
<div class="card" id="profile-card">
  <div class="logo"><img src="logo.png" style="width:24px; height:24px; border-radius:50%; vertical-align:middle; margin-right:6px;" /> Collabro</div>
  <div style="color:var(--text2);">Loading profile...</div>
</div>

<div id="connections-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;padding:20px;">
  <div class="card" style="width:100%;max-width:400px;max-height:80vh;display:flex;flex-direction:column;padding:24px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h3 style="margin:0;">Connections</h3>
      <button onclick="document.getElementById('connections-modal').style.display='none'" style="background:none;border:none;color:var(--text);font-size:1.5rem;cursor:pointer;">&times;</button>
    </div>
    <div id="connections-list" style="overflow-y:auto;flex:1;text-align:left;"></div>
  </div>
</div>

<script>
const SKILL_ICONS = { running:'🏃', cycling:'🚴', swimming:'🏊', gym:'💪', yoga:'🧘', hiking:'🥾' };
const API = window.location.origin;

async function loadPublicProfile() {
  const params = new URLSearchParams(window.location.search);
  const idParam = params.get('id');
  if (!idParam) {
    document.getElementById('profile-card').innerHTML = '<div class="logo"><img src="logo.png" style="width:24px; height:24px; border-radius:50%; vertical-align:middle; margin-right:6px;" /> Collabro</div><div class="error">No profile ID provided.</div>';
    return;
  }

  try {
    let res = await fetch(`${API}/profile/by-short-id/${idParam}`);
    if (res.status === 404) {
      res = await fetch(`${API}/profile/${idParam}`);
    }
    const p = await res.json();
    if (!res.ok) throw new Error(p.error);

    const initials = (p.name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const avatarHtml = p.avatar_url
      ? `<img src="${p.avatar_url.startsWith('/') ? API + p.avatar_url : p.avatar_url}" alt="avatar" />`
      : initials;

    document.title = `${p.name} — Collabro`;
    document.getElementById('profile-card').innerHTML = `
      <div class="logo"><img src="logo.png" style="width:24px; height:24px; border-radius:50%; vertical-align:middle; margin-right:6px;" /> Collabro</div>
      <div class="avatar">${avatarHtml}</div>
      <div class="name">${p.name}</div>
      ${p.location ? `<div class="location">📍 ${p.location}</div>` : ''}
      ${p.bio ? `<div class="bio">${p.bio}</div>` : ''}
      <div class="id-badge">ID <span>${p.short_id}</span></div>
      <div class="stats">
        <div class="stat" style="cursor:pointer;" onclick="viewConnections('${p.id}')"><div class="stat-val">${p.connectionCount||0}</div><div class="stat-label">Connections</div></div>
        <div class="stat" style="cursor:pointer;" onclick="document.getElementById('skills-section').scrollIntoView({behavior:'smooth'})"><div class="stat-val">${(p.skills||[]).length}</div><div class="stat-label">Skills</div></div>
      </div>
      <div id="skills-section" style="margin-bottom:8px;">
        ${(p.skills||[]).map(s=>`<span class="skill-pill">${SKILL_ICONS[s.name]||'🏅'} ${s.name}${s.proficiency ? ` · ${s.proficiency}` : ''}${s.endorsement_count > 0 ? ` 👍${s.endorsement_count}` : ''}${s.verified_count > 0 ? ` ✅${s.verified_count}` : ''}</span>`).join('')}
      </div>
      <a href="${API}" class="btn">Connect on Collabro →</a>
    `;
  } catch (err) {
    document.getElementById('profile-card').innerHTML = `<div class="logo"><img src="logo.png" style="width:24px; height:24px; border-radius:50%; vertical-align:middle; margin-right:6px;" /> Collabro</div><div class="error">Profile not found.</div>`;
  }
}

async function viewConnections(userId) {
  const modal = document.getElementById('connections-modal');
  const list = document.getElementById('connections-list');
  modal.style.display = 'flex';
  list.innerHTML = '<div style="text-align:center;color:var(--text2);">Loading...</div>';
  
  try {
    const token = localStorage.getItem('sc_token');
    const headers = {};
    if (token) headers['Authorization'] = 'Bearer ' + token;
    
    const res = await fetch(`${API}/connections/${userId}`, { headers });
    const data = await res.json();
    
    if (res.status === 403) {
      list.innerHTML = `<div style="text-align:center;color:var(--text2);padding:20px;">This user's connections are private.</div>`;
      return;
    }
    if (!res.ok) throw new Error(data.error || 'Failed to load connections');
    
    const conns = data.connections || [];
    if (!conns.length) {
      list.innerHTML = '<div style="text-align:center;color:var(--text2);padding:20px;">No connections found.</div>';
      return;
    }
    
    list.innerHTML = conns.map(c => `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;background:var(--surface);padding:8px 12px;border-radius:12px;">
        <div style="width:40px;height:40px;font-size:1rem;flex-shrink:0;margin:0;" class="avatar">${c.avatar_url ? `<img src="${c.avatar_url.startsWith('/') ? API + c.avatar_url : c.avatar_url}"/>` : (c.name||'?')[0]}</div>
        <div><div style="font-weight:600;font-size:0.9rem;">${c.name}</div></div>
      </div>
    `).join('');
    
  } catch (err) {
    list.innerHTML = `<div style="text-align:center;color:#f87171;padding:20px;">${err.message}</div>`;
  }
}

loadPublicProfile();
</script>
</body>
</html>

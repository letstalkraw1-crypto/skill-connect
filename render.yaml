services:
  # Frontend Service
  - type: web
    name: skill-connect-frontend
    env: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: production

  # Backend Service  
  - type: web
    name: skill-connect-backend
    env: node
    plan: starter
    buildCommand: cd backend && npm ci
    startCommand: cd backend && npm start
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Add your other environment variables here
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: skill-connect-db
      #     property: connectionString

# Optional: Database (if using Render's managed database)
# databases:
#   - name: skill-connect-db
#     databaseName: skillconnect
#     user: skillconnect_user
#     plan: starter

# Optional: Redis (if using Render's managed Redis)
# - type: redis
#   name: skill-connect-redis
#   plan: starter
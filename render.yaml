services:
  - type: web
    name: skill-connect-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm run build
    startCommand: npm run start
    healthCheckPath: /health
    healthCheckInterval: 30
    healthCheckTimeout: 10
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER_EXTERNAL_URL
        value: https://collabro.onrender.com
